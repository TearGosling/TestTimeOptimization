dataset:
  name: "codelion/fineweb-edu-1B"
  max_seq_length: 512
model:
  type: "titans"
  vocab_size: 32000
  hidden_size: 1024
  intermediate_size: 2736
  num_hidden_layers: 16
  hidden_act: "silu"
  variant: "mal"
  chunk_size: 8
  num_mem_heads: 16
  num_attention_heads: 16
  num_key_value_heads: 4
  num_persistent_mem_tokens: 4
  use_output_proj: true
  use_gate: true
  scan_checkpoint_group_size: 8
  sliding_window: 256
  rms_qk_norm: true
tokenizer: "NousResearch/Llama-2-7b-hf"
training_args:
  device: "cuda"
  gradient_checkpointing: true
  learning_rate: 0.0001
  logging_steps: 1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  per_device_train_batch_size: 4
  project: "tto-training"
  output_dir: "./checkpoints/titans_mag_335m_model"
  num_train_epochs: 1
  report_to: "wandb"
  resume_from_checkpoint: null
  save_steps: 1000
  save_total_limit: 3
  seed: 80085
  torch_compile: false
  #warmup_steps: 0.01
  weight_decay: 0.1
